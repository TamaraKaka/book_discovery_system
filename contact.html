<form action="" method="post" id="contactForm" autocomplete="off" class="contactForm">
<label for="fullname">Full Name: </label><br>
<input type="text" id="fullname" placeholder="Enter your full name" required><br><br>

<label for="email">Email: </label><br>
<input type="email" id="email" placeholder="Enter your email address" required><br><br>

<label for="phone">Phone Number:</label><br>
<input type="tel" id="phone" placeholder="Enter your phone number" required><br><br>

<label for="feedback">Select Type of Message:</label><br>
<input type="radio" id="Suggestion" name="fav_language" value="HTML">
<label for="Suggestion">Suggestion</label><br>
<input type="radio" id="Complaint" name="fav_language" value="CSS">
<label for="Complaint">Complaint</label><br>
<input type="radio" id="Question" name="fav_language" value="JavaScript">
<label for="Question">Question</label><br>
<input type="text" id="feedback" placeholder="Enter your message here"><br>

<button type="submit">Enter Message</button><br>

    </form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
