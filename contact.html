<form action="" method="post" id="contactForm" autocomplete="off" class="contactForm">
<label for="fullname">Full Name: </label><br>
<input type="text" id="fullname" placeholder="Enter your full name" class="form-control" required><br><br>

<label for="email" class="form-label">Email: </label><br>
<input class="form-control" id="exampleFormControlInput1" placeholder="name@example.com" required><br><br>

<label for="phone">Phone Number:</label><br>
<input type="tel" id="phone" placeholder="Enter your phone number" class="form-control" required><br><br>

<label for="feedback">Select Type of Message:</label><br>
<input type="radio" id="Suggestion" name="fav_language" class="form-check-input">
<label class="form-check-label" for="Suggestion">Suggestion</label><br>
<input type="radio" id="Complaint" name="fav_language"class="form-check-input">
<label for="Complaint" class="form-check-label">Complaint</label><br>
<input type="radio" id="Question" name="fav_language" class="form-check-input">
<label for="Question" class="form-check-label">Question</label><br><br>
<textarea class="form-control" placeholder="Enter your message here" id="floatingTextarea2" style="height: 100px"></textarea>

<button type="submit">Submit</button><br>

    </form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
