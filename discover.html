<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Page</title>
</head>
<body>
    <h1>Find a Book</h1>
    <div class="search-container">
  <input type="text" id="searchInput" placeholder="Search books by title or author...">
  <button type="submit">Search</button>

  <h2>Browse by Genre</h2>

<div class="genre-grid">

  <div class="genre-card">
    <img src="images/fantasy.jpg" alt="Fantasy">
    <p>Fantasy</p>
  </div>
  <div class="genre-card">
    <img src="images/scifi.jpg" alt="Fantasy">
    <p>Sci-Fi</p>
  </div>

  <div class="genre-card">
    <img src="images/mystery.jpg" alt="Mystery">
    <p>Mystery & Thriller</p>
  </div>
  <div class="genre-card">
    <img src="images/ya.jpg" alt="Romance">
    <p>Young Adult</p>
  </div>
  <div class="genre-card">
    <img src="images/memoir.jpg" alt="Romance">
    <p>Memoir and Autobiography</p>
  </div>

  <div class="genre-card">
    <img src="images/classic.jpg" alt="Classics">
    <p>Classics</p>
  </div>

</div>
</div>
</body>
</html>
