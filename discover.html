<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./CSS/styles.css" rel="stylesheet">
</head>
<body>
    <h1>Find a Book</h1>
    <ul class="nav nav-tabs">
  <li class="nav-item">
    <a class="nav-link" href="./index.html">Home</a>
  </li>

  <li class="nav-item">
    <a class="nav-link active" href="./discover.html">Discover Books</a>
  </li>

  <li class="nav-item">
    <a class="nav-link" href="./wishlist.html">Wishlist</a>
  </li>

  <li class="nav-item">
    <a class="nav-link" href="./bookpicker.html">Book Picker</a>
  </li>

  <li class="nav-item">
    <a class="nav-link" href="./contact.html">Contact</a>
  </li>
</ul><br>

<div class="container mt-4">

  <div class="search-container mb-4">
    <input
      type="text"
      id="searchInput"
      class="form-control"
      placeholder="Search books by title or author..."
    >
    <button type="submit"  id="searchBtn">Search</button>
  </div>

  <h2 class="mb-4">Browse by Genre</h2>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="booksContainer">

    <div class="col">
      <div class="card h-100 text-center genre-card" data-genre="Fantasy">
        <img src="images/fantasy.jpg" class="card-img-top" alt="Fantasy">
        <div class="card-body">
          <p class="card-text" >Fantasy</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card h-100 text-center genre-card" data-genre="Sci-Fi">
        <img src="images/scifi.jpg" class="card-img-top" alt="Sci-Fi">
        <div class="card-body">
          <p class="card-text">Sci-Fi</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card h-100 text-center genre-card" data-genre="Mystery/Thriller">
        <img src="images/mystery.jpg" class="card-img-top" alt="Mystery">
        <div class="card-body">
          <p class="card-text">Mystery & Thriller</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card h-100 text-center genre-card" data-genre="YA">
        <img src="images/ya.jpg" class="card-img-top" alt="Young Adult">
        <div class="card-body">
          <p class="card-text">Young Adult</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card h-100 text-center genre-card" data-genre="Memoir/Autobiography">
        <img src="images/memoir.jpg" class="card-img-top" alt="Memoir and Autobiography">
        <div class="card-body">
          <p class="card-text">Memoir & Autobiography</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card h-100 text-center genre-card" data-genre="Classics">
        <img src="images/classic.jpg" class="card-img-top" alt="Classics">
        <div class="card-body">
          <p class="card-text">Classics</p>
        </div>
      </div>
    </div>

  </div>

</div>

</div>
</div>
<script src="JS/books.js"></script>
<script src="JS/discover.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
